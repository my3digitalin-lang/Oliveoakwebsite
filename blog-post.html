<html lang="en">
<head>
<meta charset="UTF-8">

<title>Loading... | OliveOak Interiors</title>

<style>
:root{--bg:#080706;--gold:#c8a97e;--white:#f8f3ea;--dim:rgba(248,243,234,.55);--glass:rgba(255,255,255,.04);--border:rgba(200,169,126,.12);--f-display:'Cormorant Garamond',serif;--f-body:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f-body);background:var(--bg);color:var(--white);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 60px;height:72px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,7,6,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,169,126,.08)}
.nav-logo{height:44px;overflow:hidden;display:flex;align-items:center;text-decoration:none}
.nav-logo img{height:128px;margin-top:-2px;filter:brightness(1.2)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .3s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{background:transparent;border:1px solid rgba(200,169,126,.4);border-radius:6px;padding:9px 22px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);cursor:pointer;text-decoration:none;transition:all .3s}
.nav-cta:hover{background:var(--gold);color:#0a0806}
@media(max-width:900px){nav{padding:0 24px}.nav-links,.nav-cta{display:none}}

/* HERO */
.post-hero{margin-top:72px;position:relative;height:55vh;min-height:380px;overflow:hidden;background:#0d0b09}
.post-hero-img{width:100%;height:100%;object-fit:cover;filter:brightness(.65)}
.post-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,7,6,.3) 0%,rgba(8,7,6,.65) 100%)}
.post-hero-content{position:absolute;bottom:48px;left:0;right:0;max-width:860px;margin:0 auto;padding:0 40px}
.post-cat-tag{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(200,169,126,.35);padding:5px 16px;border-radius:20px;background:rgba(200,169,126,.06);display:inline-block;margin-bottom:18px}
.post-h1{font-family:var(--f-display);font-size:clamp(28px,4vw,54px);color:var(--white);line-height:1.1;font-weight:400;margin-bottom:16px}
.post-meta{font-size:11px;color:var(--dim);letter-spacing:1.5px}

/* BODY */
.post-body{max-width:860px;margin:0 auto;padding:64px 40px 80px}
.post-intro{font-family:var(--f-display);font-size:clamp(18px,2.2vw,26px);font-weight:300;font-style:italic;color:rgba(248,243,234,.85);line-height:1.7;margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid rgba(200,169,126,.1)}
.post-body h2{font-family:var(--f-display);font-size:clamp(22px,2.8vw,38px);font-weight:400;color:var(--white);margin:48px 0 20px;line-height:1.2}
.post-body h3{font-family:var(--f-display);font-size:clamp(18px,2.2vw,28px);font-weight:400;color:rgba(248,243,234,.9);margin:36px 0 16px}
.post-body p{font-size:15px;color:var(--dim);line-height:1.95;margin-bottom:22px}
.post-body ul,.post-body ol{margin:16px 0 24px 24px;display:flex;flex-direction:column;gap:10px}
.post-body li{font-size:15px;color:var(--dim);line-height:1.8}
.post-body strong{color:var(--white);font-weight:600}
.post-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin:40px 0 8px}
.post-gallery img{width:100%;height:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;display:block}
@media(max-width:600px){.post-gallery{grid-template-columns:1fr;gap:12px}}

/* CTA */
.post-cta{background:linear-gradient(135deg,rgba(200,169,126,.08),rgba(200,169,126,.03));border:1px solid rgba(200,169,126,.2);border-radius:20px;padding:48px 48px;margin:48px 0;text-align:center}
.post-cta h2{font-family:var(--f-display);font-size:clamp(22px,2.5vw,36px);color:var(--gold);margin-bottom:16px}
.post-cta p{font-size:14px;color:var(--dim);line-height:1.8;margin-bottom:28px;max-width:540px;margin-left:auto;margin-right:auto}
.cta-btn{display:inline-block;padding:14px 36px;background:var(--gold);color:#0a0806;font-family:var(--f-body);font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:600;border-radius:8px;text-decoration:none;transition:all .3s}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,169,126,.35)}

/* LOADING / ERROR */
.loader-wrap{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loader-spin{width:36px;height:36px;border:2px solid rgba(200,169,126,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--dim);letter-spacing:2px}
.error-box{text-align:center;padding:60px 40px}
.error-box h2{font-family:var(--f-display);font-size:32px;color:var(--gold);margin-bottom:12px}
.error-box p{color:var(--dim);margin-bottom:28px}
.back-link{color:var(--gold);text-decoration:none;font-size:13px;letter-spacing:1px}

/* FOOTER */
footer{border-top:1px solid rgba(200,169,126,.08);padding:40px;text-align:center;color:var(--dim);font-size:12px}
footer a{color:var(--gold);text-decoration:none;margin:0 16px}

@media(max-width:768px) {
  .post-hero { height: 48vh; min-height: 300px; }
  .post-hero-content { bottom: 32px; padding: 0 22px; }
  .post-cat-tag { margin-bottom: 14px; }
  .post-body { padding: 44px 22px 60px; }
  .post-intro { margin-bottom: 36px; padding-bottom: 30px; }
  .post-body h2 { margin: 36px 0 16px; }
  .post-cta { padding: 36px 22px; margin: 36px 0; border-radius: 14px; }
  .post-cta p { max-width: 100%; }
  footer { padding: 32px 22px; }
}

@media(max-width:480px) {
  .post-hero-content { padding: 0 16px; bottom: 24px; }
  .post-body { padding: 36px 16px 48px; }
  .post-cta { padding: 28px 18px; }
  .cta-btn { padding: 13px 28px; }
}
</style>

    <a href="contact.html">Contact</a>

<!-- Firebase SDK -->



<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('id');

  if (!slug) {
    showError('No blog post specified.');
    return;
  }

  try {
    const res = await fetch('/data/blogs.json');
    const blogs = await res.json();
    const post = blogs.find(b => b.slug === slug && b.status === 'published');

    if (!post) {
      showError('Blog post not found.');
      return;
    }

    renderPost(post);

  } catch(e) {
    console.error(e);
    showError('Could not load blog post. Error fetching data.');
  }

  function renderPost(post) {
    document.title = (post.metaTitle || post.title) + ' | OliveOak Interiors';
    const metaDesc = document.createElement('meta');
    metaDesc.name = 'description';
    metaDesc.content = post.metaDescription || post.excerpt || '';
    document.head.appendChild(metaDesc);

    document.getElementById('postContent').innerHTML = `
      <!-- HERO -->
      <div class="post-hero">
        ${post.featuredImage ? `<img class="post-hero-img" src="${post.featuredImage}" alt="${post.title}">` : ''}
        <div class="post-hero-overlay"></div>
        <div class="post-hero-content">
          <span class="post-cat-tag">${post.category || 'Blog'}</span>
          <h1 class="post-h1">${post.title}</h1>
          <div class="post-meta">${new Date(post.createdAt).toLocaleDateString()}</div>
        </div>
      </div>

      <!-- BODY -->
      <article class="post-body">
        <div class="post-intro">${post.excerpt || ''}</div>
        ${post.content || ''}
        ${renderGallery(post)}
      </article>
    `;
  }

  function renderGallery(post) {
    const imgs = (post.images && post.images.length) ? post.images : (post.featuredImage ? [post.featuredImage] : []);
    // The first image is used as the hero above, so skip it here to avoid a duplicate
    const rest = imgs.slice(1);
    if(!rest.length) return '';
    return `<div class="post-gallery">${rest.map(u => `<img src="${u}" loading="lazy" decoding="async" alt="${post.title}">`).join('')}</div>`;
  }

  function showError(msg) {
    document.getElementById('postContent').innerHTML = `
      <div class="error-box" style="margin-top:72px">
        <h2>Oops!</h2>
        <p>${msg}</p>
        <a href="blog.html" class="back-link">← Back to Blog</a>
      </div>`;
  }
})();
</script>
